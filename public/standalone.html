<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURUM — Fine Dining Experience</title>
  <meta name="description" content="An intimate fine dining experience celebrating the art of seasonal cuisine." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"Inter"', 'sans-serif'],
          },
          colors: {
            primary: { DEFAULT: 'hsl(0 72% 45%)', foreground: '#fff' },
            muted: { DEFAULT: 'hsl(0 10% 94%)', foreground: 'hsl(0 0% 40%)' },
            secondary: { DEFAULT: 'hsl(0 30% 96%)', foreground: 'hsl(0 0% 15%)' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; color: hsl(0 0% 10%); }
    h1,h2,h3,h4,h5,h6 { font-family: 'Playfair Display', serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .font-body { font-family: 'Inter', sans-serif; }
    .text-gold-gradient {
      background: linear-gradient(135deg, hsl(0 72% 45%), hsl(0 60% 55%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tab-active { background: hsl(0 72% 45%); color: #fff; border-color: hsl(0 72% 45%); }
    .tab-inactive { background: transparent; color: hsl(0 0% 40%); border-color: hsl(0 15% 88%); }
    .tab-inactive:hover { border-color: hsl(0 72% 45% / 0.5); color: hsl(0 0% 10%); }
    .menu-card img { transition: transform 0.7s; }
    .menu-card:hover img { transform: scale(1.05); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    .animate-fade-up { animation: fadeUp 0.8s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .lang-btn { transition: color 0.2s; }
    .lang-btn:hover { color: hsl(0 72% 45%); }
    .lang-btn.active { color: hsl(0 72% 45%); font-weight: 600; }
  </style>
</head>
<body class="bg-white">

  <!-- ============ HERO ============ -->
  <section class="relative min-h-screen flex items-center justify-center overflow-hidden">

      <span class="font-display text-2xl tracking-wider text-primary">AURUM</span>
      <div class="flex items-center gap-6">
        <!-- Language Switcher -->
        <div class="flex items-center gap-1 text-xs font-body" id="lang-switcher"></div>
        <div class="hidden md:flex items-center gap-8 font-body text-sm tracking-widest uppercase text-white">

          <a href="#menu" class="hover:text-primary transition-colors" data-i18n="nav.menu"></a>
          <a href="#reservation" class="hover:text-primary transition-colors" data-i18n="nav.reserve"></a>
          <a href="#contact" class="bg-primary text-white px-4 py-2 rounded hover:opacity-90 transition-colors" data-i18n="nav.contact"></a>
        </div>
      </div>
    </nav>

    <!-- Hero content -->

      <p class="animate-fade-up text-primary font-body text-sm tracking-[0.3em] uppercase mb-6" data-i18n="hero.subtitle"></p>
      <h1 class="animate-fade-up delay-1 font-display text-5xl md:text-7xl lg:text-8xl font-medium leading-tight mb-8 text-white drop-shadow-lg">
        <span data-i18n="hero.title1"></span><br><span class="text-gold-gradient italic" data-i18n="hero.title2"></span>

      <div class="animate-fade-up delay-3">
        <a href="#reservation" class="inline-block bg-primary text-white tracking-widest uppercase text-sm px-10 py-4 rounded hover:opacity-90 transition" data-i18n="hero.cta"></a>
      </div>
    </div>
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2">
      <div class="w-px h-16 bg-gradient-to-b from-transparent via-primary to-transparent"></div>

  <!-- ============ ABOUT ============ -->

      </div>

  <!-- ============ RESERVATION ============ -->

    // Helper: get nested value by dot-path
    function t(key) {
      const parts = key.split(".");
      let val = translations[currentLang];
      for (const p of parts) { val = val?.[p]; }
      return val ?? key;
    }

    // Render language switcher
    function renderLangSwitcher() {
      const container = document.getElementById("lang-switcher");
      container.innerHTML = "";
      languages.forEach((lang, i) => {
        const btn = document.createElement("button");
        btn.textContent = lang.label;
        btn.className = `lang-btn ${currentLang === lang.code ? "active" : "text-white/70"}`;
        btn.onclick = () => { currentLang = lang.code; document.documentElement.lang = lang.code; applyTranslations(); };
        container.appendChild(btn);
        if (i < languages.length - 1) {
          const sep = document.createElement("span");
          sep.textContent = "|";
          sep.className = "text-white/30";
          container.appendChild(sep);
        }
      });
    }

    // Apply all translations
    function applyTranslations() {
      renderLangSwitcher();
      // Update all data-i18n elements
      document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      // Update placeholders
      document.getElementById("input-name").placeholder = t("reservation.name");
      document.getElementById("input-phone").placeholder = t("reservation.phone");
      document.getElementById("input-guests").placeholder = t("reservation.guests");
      // Re-render menu
      renderTabs();
      renderGrid();
    }

    function renderTabs() {
      const container = document.getElementById("menu-tabs");
      container.innerHTML = "";
      const categories = ["biryani", "curry", "setMenu", "kebab", "beverage"];
      categories.forEach(key => {
        const btn = document.createElement("button");
        btn.textContent = t("menu." + key);
        btn.className = `px-5 py-2.5 text-sm font-body tracking-wider uppercase transition-all rounded-sm border ${key === activeTab ? "tab-active" : "tab-inactive"}`;
        btn.onclick = () => { activeTab = key; renderTabs(); renderGrid(); };
        container.appendChild(btn);
      });
    }

    function renderGrid() {
      const grid = document.getElementById("menu-grid");
      grid.innerHTML = "";
      const items = t("menu." + activeTab + "Items");
      if (!Array.isArray(items)) return;
      items.forEach((item, i) => {
        const card = document.createElement("div");
        card.className = "menu-card group";
        card.innerHTML = `
          <div class="overflow-hidden mb-5">
            <img src="${dishImages[i % dishImages.length]}" alt="${item.name}" class="w-full aspect-square object-cover" loading="lazy" />
          </div>
          <div class="flex items-start justify-between gap-4">
            <div>
              <h3 class="font-display text-xl mb-2">${item.name}</h3>
              ${item.desc ? `<p class="text-muted-foreground text-sm leading-relaxed">${item.desc}</p>` : ""}
            </div>
            <span class="text-primary font-display text-xl shrink-0">${item.price}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Init
    applyTranslations();
  </script>
</body>
</html>
